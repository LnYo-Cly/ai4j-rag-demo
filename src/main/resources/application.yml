server:
  port: 8080

spring:
  application:
    name: ai4j-rag-demo

# ---- ai4j starter (auto-configures PgVector / Ollama / Anthropic clients) ----
ai:
  okhttp:
    log: BASIC
  vector:
    pgvector:
      enabled: true
      jdbc-url: jdbc:postgresql://localhost:5432/postgres
      username: postgres
      password: postgres
      table-name: ai4j_rag_demo
      distance-operator: "<=>"
  ollama:
    api-host: http://localhost:11434/
    embedding-url: api/embed
  anthropic:
    # GLM coding-plan key 通过 Anthropic 兼容入口接入
    api-host: https://open.bigmodel.cn/api/anthropic/
    api-key: ${GLM_API_KEY:}
    chat-completion-url: v1/messages
  zhipu:
    # OpenAI 兼容入口（paas/v4）——仅在线评估（LLM-as-judge）需要它，因为 ChatRagJudge 走 OpenAI 协议。
    # 注意：coding-plan key（anthropic 入口那个）打 paas/v4 会报余额不足，这里要配 paas/v4 的常规 key。
    # 没配 key 时把 rag.online-eval-enabled 留 false 即可，judge 不会构造。
    api-host: https://open.bigmodel.cn/api/paas/
    api-key: ${ZHIPU_API_KEY:}
  jina:
    api-key: ${JINA_API_KEY:}
    api-version: 2023-06-01

# ---- demo business config ----
rag:
  dataset: ecommerce-kb
  embedding-model: hf.co/Qwen/Qwen3-Embedding-0.6B-GGUF:latest
  vector-dimension: 1024
  glm-model: glm-4.6
  top-k: 5
  reranker: llm  # none/jina/llm；jina 精度最高（rerankScore 0-1，~1s/次）但 api.jina.ai 国内需 proxy：
                  #   mvn -Dspring-boot.run.jvmArguments="-Dhttps.proxyHost=127.0.0.1 -Dhttps.proxyPort=10809" spring-boot:run
                  # llm 走 GLM（bigmodel.cn）国内直连，N 次打分较慢，作为无 proxy 时的务实选择
  jina-rerank-model: jina-reranker-v2-base-multilingual
  planner-enabled: true  # true 开启 Query Planning（GLM 生成 query variants 多路召回融合，替代 QueryRewriteService）
  planner-max-variants: 3
  hybrid-enabled: true  # true 开启 Hybrid 检索（Dense + BM25 + RRF；展示 PR #179 子路容错 best-effort）
  max-context-tokens: 4000  # TokenAware 上下文 token 预算（超则停追加，避免 prompt 溢出）；0=用默认组装器
  context-model: gpt-4  # jtokkit BPE encoding 名（国产模型传 gpt-4 近似即可）
  online-eval-enabled: false  # true 开启在线评估（每答打 faithfulness/contextRelevance/answerRelevance 分）。
                              #   需配 ai.zhipu.api-key（paas/v4 常规 key），且每答多一次 GLM 调用（成本+延迟）。
  conversational-enabled: false  # true 开启多轮对话（RagQuery 带 history，planner rewrite 消解 follow-up 指代）。
